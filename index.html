<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<h2>Debug GLS Parser</h2>
<input type="file" id="f" accept=".xlsx"/>
<pre id="out" style="font-size:12px;background:#111;color:#0f0;padding:16px;margin-top:16px;white-space:pre-wrap"></pre>
<script>
document.getElementById('f').onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev => {
    const buf = ev.target.result;
    const out = document.getElementById('out');

    // Test 1: raw:true
    const wb1 = XLSX.read(buf, { type:'array', raw:true });
    const raw1 = XLSX.utils.sheet_to_json(wb1.Sheets[wb1.SheetNames[0]], { header:1, defval:null, raw:true });
    out.textContent = '=== raw:true ===\n';
    for(let i=7;i<Math.min(11,raw1.length);i++){
      out.textContent += `Row ${i}: ${JSON.stringify(raw1[i])}\n`;
      if(raw1[i]) out.textContent += `  r[4] = ${repr(raw1[i][4])}\n`;
    }

    // Test 2: cellDates:true + raw:false
    const wb2 = XLSX.read(buf, { type:'array', cellDates:true });
    const raw2 = XLSX.utils.sheet_to_json(wb2.Sheets[wb2.SheetNames[0]], { header:1, defval:null });
    out.textContent += '\n=== cellDates:true, raw:false ===\n';
    for(let i=7;i<Math.min(11,raw2.length);i++){
      out.textContent += `Row ${i}: ${JSON.stringify(raw2[i])}\n`;
      if(raw2[i]) out.textContent += `  r[4] = ${repr(raw2[i][4])}\n`;
    }

    // Test 3: no options
    const wb3 = XLSX.read(buf, { type:'array' });
    const raw3 = XLSX.utils.sheet_to_json(wb3.Sheets[wb3.SheetNames[0]], { header:1, defval:null });
    out.textContent += '\n=== no options ===\n';
    for(let i=7;i<Math.min(11,raw3.length);i++){
      out.textContent += `Row ${i}: ${JSON.stringify(raw3[i])}\n`;
      if(raw3[i]) out.textContent += `  r[4] = ${repr(raw3[i][4])}\n`;
    }
  };
  reader.readAsArrayBuffer(file);
};

function repr(v) {
  return `${JSON.stringify(v)} (type: ${typeof v})`;
}
</script>
</body>
</html>
